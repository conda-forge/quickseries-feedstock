{% set python_min = '3.11' %}
{% set name = "quickseries" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/quickseries-{{ version }}.tar.gz
  sha256: 3f71945d977bfcb8d409df63f14c5490b843f6fddfbc09d99020ea041fe15844

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - dustgoggles
    - numpy
    - scipy
    - sympy

test:
  imports:
    - quickseries
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/millionconcepts/quickseries.git
  summary: generate fast approximations of mathematical functions
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - m-stclair
